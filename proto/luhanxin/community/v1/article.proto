syntax = "proto3";

package luhanxin.community.v1;

import "google/protobuf/timestamp.proto";
import "luhanxin/community/v1/common.proto";
import "luhanxin/community/v1/user.proto";

// 文章服务
service ArticleService {
  // 获取文章详情
  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse);
  // 获取文章列表
  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse);
  // 创建文章（需认证）
  rpc CreateArticle(CreateArticleRequest) returns (CreateArticleResponse);
  // 更新文章（需认证，仅作者）
  rpc UpdateArticle(UpdateArticleRequest) returns (UpdateArticleResponse);
  // 删除文章（需认证，仅作者，软删除）
  rpc DeleteArticle(DeleteArticleRequest) returns (DeleteArticleResponse);
}

// ──── 获取文章 ────

// 获取文章请求
message GetArticleRequest {
  // 文章 ID
  string article_id = 1;
}

// 获取文章响应
message GetArticleResponse {
  // 文章详情
  Article article = 1;
}

// ──── 文章列表 ────

// 获取文章列表请求
message ListArticlesRequest {
  // 分页参数
  PaginationRequest pagination = 1;
  // 可选：按作者筛选
  string author_id = 2;
  // 可选：模糊搜索（pg_trgm 相似度 + ILIKE）
  string query = 3;
  // 可选：按标签筛选（PostgreSQL array contains）
  string tag = 4;
  // 可选：按分类筛选（支持多选，匹配任一分类）
  repeated ArticleCategory categories = 5;
}

// 获取文章列表响应
message ListArticlesResponse {
  // 文章列表
  repeated Article articles = 1;
  // 分页元数据
  PaginationResponse pagination = 2;
}

// ──── 创建文章 ────

message CreateArticleRequest {
  // 文章标题
  string title = 1;
  // 文章内容 (Markdown)
  string content = 2;
  // 文章摘要（可选，为空时自动截取 content 前 200 字）
  string summary = 3;
  // 标签列表
  repeated string tags = 4;
  // 文章状态（DRAFT 或 PUBLISHED）
  ArticleStatus status = 5;
  // 文章分类（可多选）
  repeated ArticleCategory categories = 6;
}

message CreateArticleResponse {
  // 创建后的文章（含生成的 id/slug）
  Article article = 1;
}

// ──── 更新文章 ────

message UpdateArticleRequest {
  // 文章 ID
  string article_id = 1;
  // 文章标题（可选，为空不更新）
  string title = 2;
  // 文章内容（可选，为空不更新）
  string content = 3;
  // 文章摘要（可选，为空不更新）
  string summary = 4;
  // 标签列表（可选，空数组不更新）
  repeated string tags = 5;
  // 文章状态（可选，UNSPECIFIED 不更新）
  ArticleStatus status = 6;
  // 文章分类（可选，空数组不更新）
  repeated ArticleCategory categories = 7;
}

message UpdateArticleResponse {
  // 更新后的文章
  Article article = 1;
}

// ──── 删除文章 ────

message DeleteArticleRequest {
  // 文章 ID
  string article_id = 1;
}

message DeleteArticleResponse {
  // 空响应，软删除成功
}

// ──── 公共类型 ────

// 文章信息
message Article {
  // 文章唯一标识
  string id = 1;
  // 文章标题
  string title = 2;
  // URL slug
  string slug = 3;
  // 文章摘要
  string summary = 4;
  // 文章内容 (Markdown)
  string content = 5;
  // 作者 ID
  string author_id = 6;
  // 标签列表
  repeated string tags = 7;
  // 浏览次数
  int32 view_count = 8;
  // 点赞次数
  int32 like_count = 9;
  // 文章状态
  ArticleStatus status = 10;
  // 创建时间
  google.protobuf.Timestamp created_at = 11;
  // 更新时间
  google.protobuf.Timestamp updated_at = 12;
  // 发布时间
  google.protobuf.Timestamp published_at = 13;
  // 作者信息（可选，由 Gateway BFF 层填充，svc-content 不填）
  User author = 14;
  // 文章分类（可多选）
  repeated ArticleCategory categories = 15;
}

// 文章状态枚举
enum ArticleStatus {
  ARTICLE_STATUS_UNSPECIFIED = 0;
  ARTICLE_STATUS_DRAFT = 1;
  ARTICLE_STATUS_PUBLISHED = 2;
  ARTICLE_STATUS_ARCHIVED = 3;
}

// 文章分类枚举
enum ArticleCategory {
  ARTICLE_CATEGORY_UNSPECIFIED = 0;
  ARTICLE_CATEGORY_BACKEND = 1;
  ARTICLE_CATEGORY_FRONTEND = 2;
  ARTICLE_CATEGORY_AI = 3;
  ARTICLE_CATEGORY_MOBILE = 4;
  ARTICLE_CATEGORY_DEVTOOLS = 5;
  ARTICLE_CATEGORY_READING = 6;
}
