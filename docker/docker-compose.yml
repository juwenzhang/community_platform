# Luhanxin Community Platform - Development Infrastructure
# Usage: cd docker && docker compose up -d

services:
  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: luhanxin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luhanxin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luhanxin_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-luhanxin_community}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luhanxin} -d ${POSTGRES_DB:-luhanxin_community}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: luhanxin-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2024}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------- Meilisearch ----------
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: luhanxin-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_master_key_2024}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- Consul (服务发现) ----------
  consul:
    image: hashicorp/consul:latest
    container_name: luhanxin-consul
    restart: unless-stopped
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "${CONSUL_HTTP_PORT:-8500}:8500"   # HTTP API + Web UI
      - "${CONSUL_DNS_PORT:-8600}:8600/udp" # DNS
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------- NATS (消息队列) ----------
  nats:
    image: nats:latest
    container_name: luhanxin-nats
    restart: unless-stopped
    command: -m 8222
    ports:
      - "${NATS_PORT:-4222}:4222"          # Client
      - "${NATS_MONITOR_PORT:-8222}:8222"  # Monitoring / Healthz
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm=http://localhost:8222"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 3s

volumes:
  postgres_data:
    name: luhanxin_postgres_data
  redis_data:
    name: luhanxin_redis_data
  meili_data:
    name: luhanxin_meili_data
