# DeepSource Configuration
# https://deepsource.io/docs/config/

version = 1

# 全局配置
test_patterns = [
  "tests/**",
  "**/*_test.*",
  "**/*.test.*",
  "**/*.spec.*"
]

# 排除路径
exclude_patterns = [
  "docs/**",
  ".github/**",
  "node_modules/**",
  "dist/**",
  "build/**",
  "*.min.js",
  "*.min.css"
]

# 分析器配置
[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  runtime_version = "20.x"
  environment = "browser"

[[analyzers]]
name = "typescript"
enabled = true

  [analyzers.meta]
  runtime_version = "20.x"
  environment = "browser"

[[analyzers]]
name = "rust"
enabled = true

  [analyzers.meta]
  rust_edition = "2024"
  rust_version = "1.85"

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.12.x"
  type_checker = "mypy"

[[analyzers]]
name = "go"
enabled = true

  [analyzers.meta]
  go_version = "1.22"

# 安全分析器
[[analyzers]]
name = "secrets"
enabled = true

# Dockerfile 分析
[[analyzers]]
name = "dockerfile"
enabled = true

# YAML 配置分析
[[analyzers]]
name = "yaml"
enabled = true

# SQL 分析
[[analyzers]]
name = "sql"
enabled = true
